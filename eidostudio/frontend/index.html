<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Eidos Studio | Design com Alma</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Baloo+2:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
      :root {
        /* Default CSS variables for immediate rendering and fallbacks */
        --brand-primary: #F23DB3;
        --brand-orange: #f25c05;
        --brand-lilac: #bf9bbf;
        --brand-neutral: #1A1A1A;
        --brand-white: #FFFFFF;
        --brand-gradient-hero: linear-gradient(135deg, #F23DB3 0%, #f25c05 100%);
      }

      body {
        font-family: 'Inter', sans-serif;
        scroll-behavior: smooth;
        background-color: #FFFFFF;
        color: #1A1A1A;
        margin: 0;
        padding: 0;
      }
      
      .gradient-hero-custom {
        background: var(--brand-gradient-hero) !important;
      }

      .text-gradient {
        background: var(--brand-gradient-hero);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      /* Custom Thin Pink Scrollbar */
      .custom-scrollbar::-webkit-scrollbar {
        width: 4px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: transparent;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: #F23DB3;
        border-radius: 10px;
      }

      @keyframes float {
        0% { transform: translateY(0px); }
        50% { transform: translateY(-20px); }
        100% { transform: translateY(0px); }
      }
      .animate-float {
        animation: float 4s ease-in-out infinite;
      }
    </style>
  </head>
  <body class="bg-white text-brand-neutral">
    <div id="root"></div>
    <script type="module" src="./index.tsx"></script>
  </body>
</html>
